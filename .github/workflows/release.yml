name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag_name: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare release notes body
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          tag_name = os.environ["TAG_NAME"]
          notes = Path("RELEASE_NOTES.md").read_text(encoding="utf-8").strip()
          notes = notes.replace("# Release Notes\n\n", "", 1)
          notes = notes.replace("## Unreleased", f"## {tag_name}", 1)
          body = (
              f"# Release Notes\n\n{notes}\n\n"
              f"## Full Changelog\n\n"
              f"- [View all changes](https://github.com/chardonnay/korTTY_rust/commits/{tag_name})\n"
          )
          Path("/tmp/kortty-release-notes.md").write_text(body, encoding="utf-8")
          PY
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: /tmp/kortty-release-notes.md

  build-macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            arch: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Apple release secrets
        id: apple-secrets
        shell: bash
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -n "$APPLE_SIGNING_CERT_P12_BASE64" ] && [ -n "$APPLE_SIGNING_CERT_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_ISSUER_ID" ] && [ -n "$APPLE_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip macOS release build because Apple secrets are missing
        if: steps.apple-secrets.outputs.available != 'true'
        run: |
          echo "Skipping signed macOS release artifacts because the required Apple signing/notarization secrets are not configured."

      - name: Validate Apple signing secrets
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_SIGNING_CERT_P12_BASE64" ] || [ -z "$APPLE_SIGNING_CERT_PASSWORD" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Missing required Apple signing secrets."
            echo "Please set APPLE_SIGNING_CERT_P12_BASE64, APPLE_SIGNING_CERT_PASSWORD, and APPLE_SIGNING_IDENTITY."
            exit 1
          fi

      - name: Validate Apple notarization secrets
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_ISSUER_ID" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "Missing required Apple notarization secrets."
            echo "Please set APPLE_API_KEY_ID, APPLE_ISSUER_ID, and APPLE_API_KEY."
            exit 1
          fi

      - name: Import Apple signing certificate
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/kortty-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_SIGNING_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/apple_signing_cert.p12"
          security import "$RUNNER_TEMP/apple_signing_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '\"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store Apple notarization credentials
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$NOTARY_KEY_PATH"
          xcrun notarytool store-credentials "kortty-notary" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_ISSUER_ID"

      - name: Configure Tauri macOS signing
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config_path = Path("src-tauri/tauri.conf.json")
          config = json.loads(config_path.read_text(encoding="utf-8"))
          macos_bundle = config.setdefault("bundle", {}).setdefault("macOS", {})
          macos_bundle["signingIdentity"] = os.environ["APPLE_SIGNING_IDENTITY"]
          config_path.write_text(json.dumps(config, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Install npm dependencies
        if: steps.apple-secrets.outputs.available == 'true'
        run: npm ci

      - name: Build signed Tauri macOS bundles
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Locate macOS bundles
        id: bundles
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name 'KorTTY.app' | head -n1)"
          DMG_PATH="$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -name '*.dmg' | head -n1)"
          NOTARY_ZIP="$RUNNER_TEMP/KorTTY-notarization-${TAG_NAME}-${{ matrix.arch }}.zip"

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Signed macOS app bundle not found."
            exit 1
          fi

          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "Signed macOS DMG not found."
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          {
            echo "app_path=$APP_PATH"
            echo "dmg_path=$DMG_PATH"
            echo "notary_zip=$NOTARY_ZIP"
          } >> "$GITHUB_OUTPUT"

      - name: Notarize and staple macOS app
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          KORTTY_APP_PATH: ${{ steps.bundles.outputs.app_path }}
          KORTTY_NOTARY_ZIP: ${{ steps.bundles.outputs.notary_zip }}
        run: |
          require_accepted_notarization() {
            local submit_log="$1"
            local submission_id
            local submission_status

            submission_id="$(sed -n 's/^  id: //p' "$submit_log" | tail -n1 | tr -d '\r')"
            submission_status="$(sed -n 's/^  status: //p' "$submit_log" | tail -n1 | tr -d '\r')"

            if [ -z "$submission_id" ]; then
              echo "Unable to determine notarization submission ID."
              exit 1
            fi

            if [ "$submission_status" != "Accepted" ]; then
              echo "Notarization finished with status: ${submission_status:-unknown}"
              echo "Fetching notarization log for submission ID: $submission_id"
              xcrun notarytool log "$submission_id" --keychain-profile "kortty-notary" || true
              exit 1
            fi
          }

          set +e
          xcrun notarytool submit "$KORTTY_NOTARY_ZIP" \
            --keychain-profile "kortty-notary" \
            --wait > "$RUNNER_TEMP/notary-app-submit.log" 2>&1
          submit_exit=$?
          cat "$RUNNER_TEMP/notary-app-submit.log"
          if [ $submit_exit -ne 0 ]; then
            require_accepted_notarization "$RUNNER_TEMP/notary-app-submit.log"
            exit $submit_exit
          fi
          require_accepted_notarization "$RUNNER_TEMP/notary-app-submit.log"
          set -e

          xcrun stapler staple "$KORTTY_APP_PATH"
          xcrun stapler validate "$KORTTY_APP_PATH"

      - name: Notarize and staple macOS dmg
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          KORTTY_DMG_PATH: ${{ steps.bundles.outputs.dmg_path }}
        run: |
          require_accepted_notarization() {
            local submit_log="$1"
            local submission_id
            local submission_status

            submission_id="$(sed -n 's/^  id: //p' "$submit_log" | tail -n1 | tr -d '\r')"
            submission_status="$(sed -n 's/^  status: //p' "$submit_log" | tail -n1 | tr -d '\r')"

            if [ -z "$submission_id" ]; then
              echo "Unable to determine notarization submission ID."
              exit 1
            fi

            if [ "$submission_status" != "Accepted" ]; then
              echo "Notarization finished with status: ${submission_status:-unknown}"
              echo "Fetching notarization log for submission ID: $submission_id"
              xcrun notarytool log "$submission_id" --keychain-profile "kortty-notary" || true
              exit 1
            fi
          }

          set +e
          xcrun notarytool submit "$KORTTY_DMG_PATH" \
            --keychain-profile "kortty-notary" \
            --wait > "$RUNNER_TEMP/notary-dmg-submit.log" 2>&1
          submit_exit=$?
          cat "$RUNNER_TEMP/notary-dmg-submit.log"
          if [ $submit_exit -ne 0 ]; then
            require_accepted_notarization "$RUNNER_TEMP/notary-dmg-submit.log"
            exit $submit_exit
          fi
          require_accepted_notarization "$RUNNER_TEMP/notary-dmg-submit.log"
          set -e

          xcrun stapler staple "$KORTTY_DMG_PATH"
          xcrun stapler validate "$KORTTY_DMG_PATH"

      - name: Prepare macOS release assets
        id: release-assets
        if: steps.apple-secrets.outputs.available == 'true'
        shell: bash
        env:
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
          KORTTY_APP_PATH: ${{ steps.bundles.outputs.app_path }}
          KORTTY_DMG_PATH: ${{ steps.bundles.outputs.dmg_path }}
        run: |
          RELEASE_ZIP="$RUNNER_TEMP/KorTTY-${TAG_NAME}-${{ matrix.arch }}-macOS.app.zip"
          RELEASE_DMG="$RUNNER_TEMP/KorTTY-${TAG_NAME}-${{ matrix.arch }}-macOS.dmg"

          rm -f "$RELEASE_ZIP" "$RELEASE_DMG"
          ditto -c -k --keepParent "$KORTTY_APP_PATH" "$RELEASE_ZIP"
          cp "$KORTTY_DMG_PATH" "$RELEASE_DMG"

          {
            echo "release_zip=$RELEASE_ZIP"
            echo "release_dmg=$RELEASE_DMG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS release artifacts
        if: steps.apple-secrets.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            ${{ steps.release-assets.outputs.release_zip }}
            ${{ steps.release-assets.outputs.release_dmg }}

  build-windows-intel:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc

  build-windows-arm:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-pc-windows-msvc

  build-linux-intel:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (DEB + RPM + AppImage)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Create tarball
        run: |
          cd src-tauri/target/release/bundle
          if [ -d "appimage" ]; then
            tar -czf kortty-${{ needs.create-release.outputs.tag_name }}-x86_64-linux.tar.gz -C appimage .
            mv kortty-${{ needs.create-release.outputs.tag_name }}-x86_64-linux.tar.gz /tmp/
          fi

      - name: Upload tarball
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: /tmp/kortty-*-linux.tar.gz

  build-linux-arm:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            pkg-config

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cross-compile Rust for aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --release --target aarch64-unknown-linux-gnu || echo "Cross-compilation may require QEMU for full build"

  build-arch-linux:
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            rust \
            nodejs \
            npm \
            webkit2gtk-4.1 \
            openssl \
            git \
            fakeroot

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Rust
        run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Create PKGBUILD
        run: |
          mkdir -p /tmp/pkg
          cat > /tmp/pkg/PKGBUILD << 'PKGEOF'
          pkgname=kortty
          pkgver=${{ needs.create-release.outputs.tag_name }}
          pkgrel=1
          pkgdesc="KorTTY - SSH Terminal Client"
          arch=('x86_64')
          url="https://github.com/chardonnay/korTTY_rust"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'openssl')
          source=()
          
          package() {
            install -Dm755 "${srcdir}/kortty" "${pkgdir}/usr/bin/kortty"
            install -Dm644 "${srcdir}/kortty.desktop" "${pkgdir}/usr/share/applications/kortty.desktop"
            install -Dm644 "${srcdir}/icon.png" "${pkgdir}/usr/share/pixmaps/kortty.png"
          }
          PKGEOF

      - name: Build package
        run: |
          cd /tmp/pkg
          cp $GITHUB_WORKSPACE/src-tauri/target/release/kortty . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/src-tauri/icons/icon.png . 2>/dev/null || true
          cat > kortty.desktop << 'DEOF'
          [Desktop Entry]
          Name=KorTTY
          Comment=SSH Terminal Client
          Exec=kortty
          Icon=kortty
          Terminal=false
          Type=Application
          Categories=System;TerminalEmulator;Network;
          DEOF

      - name: Upload Arch package
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: /tmp/pkg/*.pkg.tar.zst

  publish-release:
    needs:
      - create-release
      - build-macos
      - build-windows-intel
      - build-linux-intel
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: false
